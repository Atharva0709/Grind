# Database Configuration - loaded from .env file or environment variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/Sankalp}
spring.datasource.driverClassName=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:CSchinmay@227}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
server.port=${SERVER_PORT:8082}
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:8000,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
