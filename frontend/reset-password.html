<!DOCTYPE html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Grind OS - Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#746400",
            "primary-container": "#fadd30",
            "coral": "#FF6B6B",
            "teal": "#4ECDC4",
            "error": "#be2d06"
          },
          "fontFamily": {
            "headline": ["Space Grotesk"],
            "body": ["Space Grotesk"]
          }
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #FFFBF0;
      font-family: 'Space Grotesk', sans-serif;
    }
    .neo-shadow {
      box-shadow: 5px 5px 0px #1A1A1A;
    }
    .neo-shadow-lg {
      box-shadow: 8px 8px 0px #1A1A1A;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>

<body class="text-[#1A1A1A] font-bold h-screen flex flex-col items-center justify-center p-4">

  <div class="bg-white border-[4px] border-[#1A1A1A] p-10 neo-shadow-lg max-w-md w-full relative">
    <div class="absolute -top-6 -right-6 w-12 h-12 bg-coral border-[3px] border-[#1A1A1A] flex items-center justify-center neo-shadow transform rotate-[15deg]">
      <span class="material-symbols-outlined text-[#1A1A1A] font-black" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
    </div>

    <div class="text-center mb-8">
      <h1 class="text-4xl font-black text-primary uppercase tracking-tighter leading-none mb-2">NEW PASSWORD</h1>
      <p class="text-[10px] tracking-[0.3em] font-black uppercase text-stone-500">SET YOUR PASSWORD</p>
    </div>

    <form id="resetForm" class="flex flex-col gap-6">
      <div class="flex flex-col gap-2">
        <label class="uppercase text-xs font-black tracking-wider opacity-80">NEW PASSWORD</label>
        <input id="newPassword" type="password" placeholder="••••••••" required class="px-5 py-4 border-[3px] border-[#1A1A1A] text-lg font-bold focus:outline-none focus:bg-primary-container/20 w-full hover:bg-stone-50 transition-colors" />
      </div>

      <div class="flex flex-col gap-2">
        <label class="uppercase text-xs font-black tracking-wider opacity-80">CONFIRM PASSWORD</label>
        <input id="confirmPassword" type="password" placeholder="••••••••" required class="px-5 py-4 border-[3px] border-[#1A1A1A] text-lg font-bold focus:outline-none focus:bg-primary-container/20 w-full hover:bg-stone-50 transition-colors" />
      </div>

      <div id="error-msg" class="hidden text-sm uppercase font-black tracking-wide"></div>

      <button type="submit" class="w-full py-5 bg-teal font-black text-xl hover:bg-[#1A1A1A] hover:text-teal transition-all border-[3px] border-[#1A1A1A] neo-shadow flex justify-center items-center gap-2 mt-4">
        RESET PASSWORD <span class="material-symbols-outlined">check_circle</span>
      </button>

      <button type="button" id="backToLoginBtn" class="w-full py-4 bg-white font-black text-sm uppercase hover:bg-primary/20 transition-all border-[3px] border-[#1A1A1A] hover:translate-x-[-2px] hover:translate-y-[-2px] active:translate-x-[2px] active:translate-y-[2px]">
        BACK TO LOGIN
      </button>
    </form>
  </div>

  <script>
    const API_URL = 'http://localhost:8082/api/users';
    const resetForm = document.getElementById('resetForm');
    const msgBox = document.getElementById('error-msg');
    const backToLoginBtn = document.getElementById('backToLoginBtn');

    function getTokenFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token');
    }

    function showMessage(text, isError = true) {
      msgBox.classList.remove('hidden', 'text-error', 'text-teal');
      msgBox.classList.add(isError ? 'text-error' : 'text-teal');
      msgBox.innerText = text;
    }

    window.addEventListener('load', () => {
      const token = getTokenFromURL();
      if (!token) {
        showMessage('Invalid reset link. Please request a new password reset.');
        resetForm.style.pointerEvents = 'none';
      }
    });

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = getTokenFromURL();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!token) {
        showMessage('Invalid reset link. Please request a new password reset.');
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match.');
        return;
      }

      if (newPassword.length < 6) {
        showMessage('Password must be at least 6 characters long.');
        return;
      }

      try {
        // FIXED: Closed the backtick after reset-password
        const resp = await fetch(`${API_URL}/reset-password`, { 
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });

        if (resp.ok) {
          showMessage('Password reset successful! Redirecting to login...', false);
          setTimeout(() => {
            window.location.href = './index.html';
          }, 2000);
        } else {
          const text = await resp.text();
          showMessage(text);
        }
      } catch (err) {
        showMessage('Connection error. Is the backend running?');
      }
    });

    backToLoginBtn.addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = './index.html';
    });
  </script>
</body>

</html>
