<!DOCTYPE html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Grind OS - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#746400",
            "primary-container": "#fadd30",
            "coral": "#FF6B6B",
            "teal": "#4ECDC4",
            "error": "#be2d06"
          },
          "fontFamily": {
            "headline": ["Space Grotesk"],
            "body": ["Space Grotesk"]
          }
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #FFFBF0;
      font-family: 'Space Grotesk', sans-serif;
    }
    .neo-shadow {
      box-shadow: 5px 5px 0px #1A1A1A;
    }
    .neo-shadow-lg {
      box-shadow: 8px 8px 0px #1A1A1A;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .form-hidden {
      display: none;
    }
  </style>
</head>

<body class="text-[#1A1A1A] font-bold h-screen flex flex-col items-center justify-center p-4">

  <!-- Login Form -->
  <div id="loginContainer" class="bg-white border-[4px] border-[#1A1A1A] p-10 neo-shadow-lg max-w-md w-full relative">
    <div class="absolute -top-6 -right-6 w-12 h-12 bg-coral border-[3px] border-[#1A1A1A] flex items-center justify-center neo-shadow transform rotate-[15deg]">
      <span class="material-symbols-outlined text-[#1A1A1A] font-black" style="font-variation-settings: 'FILL' 1;">star</span>
    </div>

    <div class="text-center mb-8">
      <h1 class="text-5xl font-black text-primary uppercase tracking-tighter leading-none mb-2">GRIND</h1>
      <p class="text-[10px] tracking-[0.3em] font-black uppercase text-stone-500">SYSTEM AUTHENTICATION</p>
    </div>

    <form id="loginForm" class="flex flex-col gap-6">
      <div class="flex flex-col gap-2">
        <label class="uppercase text-xs font-black tracking-wider opacity-80">EMAIL</label>
        <input id="email" type="email" placeholder="your@email.com" required class="px-5 py-4 border-[3px] border-[#1A1A1A] text-lg font-bold focus:outline-none focus:bg-primary-container/20 w-full hover:bg-stone-50 transition-colors" />
      </div>

      <div class="flex flex-col gap-2">
        <label class="uppercase text-xs font-black tracking-wider opacity-80">PASSWORD</label>
        <input id="password" type="password" placeholder="��������" required class="px-5 py-4 border-[3px] border-[#1A1A1A] text-lg font-bold focus:outline-none focus:bg-primary-container/20 w-full hover:bg-stone-50 transition-colors" />
      </div>

      <div id="error-msg" class="hidden text-sm uppercase font-black tracking-wide"></div>

      <button type="submit" class="w-full py-5 bg-teal font-black text-xl hover:bg-[#1A1A1A] hover:text-teal transition-all border-[3px] border-[#1A1A1A] neo-shadow flex justify-center items-center gap-2 mt-4">
        BOOT SYSTEM <span class="material-symbols-outlined">power_settings_new</span>
      </button>

      <button type="button" id="registerBtn" class="w-full py-4 bg-white font-black text-sm uppercase hover:bg-primary/20 transition-all border-[3px] border-[#1A1A1A] hover:translate-x-[-2px] hover:translate-y-[-2px] active:translate-x-[2px] active:translate-y-[2px]">
        REGISTER NEW ID
      </button>

      <button type="button" id="forgotPasswordBtn" class="w-full py-2 bg-white font-black text-xs uppercase hover:bg-coral/20 transition-all border-[2px] border-[#1A1A1A]">
        FORGOT PASSWORD?
      </button>
    </form>
  </div>

  <!-- Forgot Password Form -->
  <div id="forgotPasswordContainer" class="form-hidden bg-white border-[4px] border-[#1A1A1A] p-10 neo-shadow-lg max-w-md w-full relative">
    <div class="absolute -top-6 -right-6 w-12 h-12 bg-coral border-[3px] border-[#1A1A1A] flex items-center justify-center neo-shadow transform rotate-[15deg]">
      <span class="material-symbols-outlined text-[#1A1A1A] font-black" style="font-variation-settings: 'FILL' 1;">mail</span>
    </div>

    <div class="text-center mb-8">
      <h1 class="text-4xl font-black text-primary uppercase tracking-tighter leading-none mb-2">RESET</h1>
      <p class="text-[10px] tracking-[0.3em] font-black uppercase text-stone-500">PASSWORD RECOVERY</p>
    </div>

    <form id="forgotPasswordForm" class="flex flex-col gap-6">
      <p class="text-sm text-stone-600">Enter your email address and we'll send you a password reset link.</p>

      <div class="flex flex-col gap-2">
        <label class="uppercase text-xs font-black tracking-wider opacity-80">EMAIL</label>
        <input id="forgotEmail" type="email" placeholder="your@email.com" required class="px-5 py-4 border-[3px] border-[#1A1A1A] text-lg font-bold focus:outline-none focus:bg-primary-container/20 w-full hover:bg-stone-50 transition-colors" />
      </div>

      <div id="forgot-error-msg" class="hidden text-sm uppercase font-black tracking-wide"></div>

      <button type="submit" class="w-full py-5 bg-teal font-black text-xl hover:bg-[#1A1A1A] hover:text-teal transition-all border-[3px] border-[#1A1A1A] neo-shadow flex justify-center items-center gap-2 mt-4">
        SEND RESET LINK <span class="material-symbols-outlined">mail_outline</span>
      </button>

      <button type="button" id="backToLoginBtn" class="w-full py-4 bg-white font-black text-sm uppercase hover:bg-primary/20 transition-all border-[3px] border-[#1A1A1A] hover:translate-x-[-2px] hover:translate-y-[-2px] active:translate-x-[2px] active:translate-y-[2px]">
        BACK TO LOGIN
      </button>
    </form>
  </div>

  <script>
    const API_URL = 'http://localhost:8082/api/users';

    const loginForm = document.getElementById('loginForm');
    const forgotPasswordForm = document.getElementById('forgotPasswordForm');
    const registerBtn = document.getElementById('registerBtn');
    const forgotPasswordBtn = document.getElementById('forgotPasswordBtn');
    const backToLoginBtn = document.getElementById('backToLoginBtn');
    
    const loginContainer = document.getElementById('loginContainer');
    const forgotPasswordContainer = document.getElementById('forgotPasswordContainer');
    
    const msgBox = document.getElementById('error-msg');
    const forgotMsgBox = document.getElementById('forgot-error-msg');

    window.addEventListener('load', () => {
      const userId = localStorage.getItem('userId');
      if (userId) {
        window.location.href = './home_dashboard_1/code.html';
      }
    });

    function showMessage(text, isError = true) {
      msgBox.classList.remove('hidden', 'text-error', 'text-teal');
      msgBox.classList.add(isError ? 'text-error' : 'text-teal');
      msgBox.innerText = text;
    }

    function showForgotMessage(text, isError = true) {
      forgotMsgBox.classList.remove('hidden', 'text-error', 'text-teal');
      forgotMsgBox.classList.add(isError ? 'text-error' : 'text-teal');
      forgotMsgBox.innerText = text;
    }

    forgotPasswordBtn.addEventListener('click', (e) => {
      e.preventDefault();
      loginContainer.classList.add('form-hidden');
      forgotPasswordContainer.classList.remove('form-hidden');
    });

    backToLoginBtn.addEventListener('click', (e) => {
      e.preventDefault();
      forgotPasswordContainer.classList.add('form-hidden');
      loginContainer.classList.remove('form-hidden');
      forgotMsgBox.classList.add('hidden');
      document.getElementById('forgotEmail').value = '';
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const resp = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (resp.ok) {
          const data = await resp.json();
          localStorage.setItem('userId', data.id);
          localStorage.setItem('email', data.email);
          window.location.href = './home_dashboard_1/code.html';
        } else {
          showMessage('Invalid email or password. Please try again.');
        }
      } catch (err) {
        showMessage('Connection error. Is the backend running?');
      }
    });

    registerBtn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showMessage('Please enter both email and password.');
        return;
      }

      try {
        const resp = await fetch(`${API_URL}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (resp.ok) {
          showMessage('Registration successful! Check your email for confirmation. You can now login.', false);
          document.getElementById('email').value = '';
          document.getElementById('password').value = '';
        } else {
          const text = await resp.text();
          showMessage(text);
        }
      } catch (err) {
        showMessage('Connection error. Is the backend running?');
      }
    });

    forgotPasswordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value.trim();

      if (!email) {
        showForgotMessage('Please enter your email address.');
        return;
      }

      try {
        const resp = await fetch(`${API_URL}/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        if (resp.ok) {
          showForgotMessage('Password reset email sent! Check your inbox for the reset link.', false);
          document.getElementById('forgotEmail').value = '';
          setTimeout(() => {
            forgotPasswordContainer.classList.add('form-hidden');
            loginContainer.classList.remove('form-hidden');
          }, 3000);
        } else {
          const text = await resp.text();
          showForgotMessage(text);
        }
      } catch (err) {
        showForgotMessage('Connection error. Is the backend running?');
      }
    });
  </script>
</body>

</html>
